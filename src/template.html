<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battleships</title>
</head>

<body>
    <div class="uiBody">
        <div class="info">
            <h1>Battleships</h1>
            <p class="phase"></p>
            <button class="play">Play</button>
            <button class="reset">Reset</button>

        </div>

        <div class="boards">
            <div class="player">
                <h2>Your Board</h2>
                <div class="board-wrapper">
                    <div class="row">
                        <div>0</div>
                        <div>1</div>
                        <div>2</div>
                        <div>3</div>
                        <div>4</div>
                        <div>5</div>
                        <div>6</div>
                        <div>7</div>
                        <div>8</div>
                        <div>9</div>
                    </div>
                    <div class="playerBoard"></div>
                </div>
                <div class="col">
                    <div>0</div>
                    <div>1</div>
                    <div>2</div>
                    <div>3</div>
                    <div>4</div>
                    <div>5</div>
                    <div>6</div>
                    <div>7</div>
                    <div>8</div>
                    <div>9</div>
                </div>
            </div>
            <div class="comp">
                <h2>Opponent's Board</h2>
                <div class="board-wrapper">
                    <div class="row">
                        <div>0</div>
                        <div>1</div>
                        <div>2</div>
                        <div>3</div>
                        <div>4</div>
                        <div>5</div>
                        <div>6</div>
                        <div>7</div>
                        <div>8</div>
                        <div>9</div>
                    </div>
                    <div class="computerBoard"></div>
                </div>

                <div class="col">
                    <div>0</div>
                    <div>1</div>
                    <div>2</div>
                    <div>3</div>
                    <div>4</div>
                    <div>5</div>
                    <div>6</div>
                    <div>7</div>
                    <div>8</div>
                    <div>9</div>
                </div>

            </div>

        </div>

</body>

</html>
